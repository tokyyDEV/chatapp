<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>

  <!-- Névválasztó overlay -->
  <div id="join-screen">
    <div class="join-box">
      <div class="join-logo">
        <span class="logo-bracket">[</span>
        <span class="logo-text">open<strong>chat</strong></span>
        <span class="logo-bracket">]</span>
      </div>
      <p class="join-sub">nyilvános szoba · mindenki látja</p>
      <input id="name-input" type="text" placeholder="felhasználónév..."
             maxlength="20" autocomplete="off" spellcheck="false" />
      <button id="join-btn">belépés →</button>
      <p class="join-hint">nem kell regisztráció</p>
    </div>
  </div>

  <!-- Fő chat UI -->
  <div id="chat-screen" class="hidden">
    <header class="chat-header">
      <div class="header-left">
        <span class="logo-small">[<strong>open</strong>chat]</span>
        <span class="room-tag">#general</span>
      </div>
      <div class="header-right">
        <span class="online-dot"></span>
        <span id="online-count">0 online</span>
        <button id="logout-btn" title="Kilépés">✕</button>
      </div>
    </header>

    <div id="messages" class="messages"></div>
    <div id="typing-bar" class="typing-bar"></div>

    <div class="input-area">
      <input id="msg-input" type="text" placeholder="Üzenet..." maxlength="400"
             autocomplete="off" spellcheck="false" />
      <button id="send-btn">küld</button>
    </div>
  </div>

  <script type="module" src="index.js"></script>
</body>
</html>
